# ====================================================
# CONFIGURATION API GATEWAY
# ====================================================

# Port du serveur
server:
  port: 8080

# Nom de l'application
spring:
  application:
    name: gateway-service

  # Configuration Spring Cloud Gateway
  cloud:
    gateway:
      # Decouverte automatique des services via Eureka
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true

      # Routes personnalis?es
      routes:
        # Route 1 : Client Service
        - id: client
          uri: lb://client
          predicates:
            - Path=/api/client/**

        # Route 2 : Account Service (ou Compte Service)
        - id: compte
          uri: lb://compte
          predicates:
            - Path=/api/compte/**

# Configuration Eureka Client
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}

# Configuration Actuator
management:
  endpoints:
    web:
      exposure:
        include: gateway, health, info, metrics
  endpoint:
    gateway:
      enabled: true
    health:
      show-details: always

# Configuration JWT
jwt:
  secret: banqueSecretKey2024JWTMicroservicesVeryLongSecretKey256bits
  expiration: 86400000   # 24h en millisecondes

# Logs
logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

